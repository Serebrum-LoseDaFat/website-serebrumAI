<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Serebrum thesis — three principles">
  <defs>
    <style>
      .sans { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Consolas, monospace; }
      .serif { font-family: 'Instrument Serif', Georgia, 'Times New Roman', serif; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="640" fill="#070709" rx="24"/>
  <rect x="0.5" y="0.5" width="1199" height="639" rx="24" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- Header -->
  <g class="mono">
    <text x="60" y="56" fill="#34d399" font-size="11" letter-spacing="3">/ THE THESIS</text>
  </g>
  <g class="serif">
    <text x="60" y="112" fill="#fafafa" font-size="40" font-style="italic">Three ideas we&#8217;re betting the studio on.</text>
  </g>

  <!-- ==================== PANEL 01: Scarcity → Abundance ==================== -->
  <g transform="translate(60, 170)">
    <rect width="340" height="420" rx="20" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>

    <!-- Left sparse cluster -->
    <g fill="rgba(255,255,255,0.35)">
      <circle cx="55" cy="70" r="3"/>
      <circle cx="95" cy="105" r="3"/>
      <circle cx="130" cy="78" r="3"/>
      <circle cx="70" cy="140" r="3"/>
      <circle cx="115" cy="155" r="3"/>
    </g>

    <!-- Arrow -->
    <g stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="160" y1="110" x2="192" y2="110"/>
      <polyline points="186,105 192,110 186,115"/>
    </g>

    <!-- Right dense grid (6x5 emerald dots) -->
    <g fill="#34d399">
      <!-- Row 1 -->
      <circle cx="210" cy="65" r="2.5"/><circle cx="230" cy="65" r="2.5"/><circle cx="250" cy="65" r="2.5"/><circle cx="270" cy="65" r="2.5"/><circle cx="290" cy="65" r="2.5"/><circle cx="310" cy="65" r="2.5"/>
      <!-- Row 2 -->
      <circle cx="210" cy="87" r="2.5"/><circle cx="230" cy="87" r="2.5"/><circle cx="250" cy="87" r="2.5"/><circle cx="270" cy="87" r="2.5"/><circle cx="290" cy="87" r="2.5"/><circle cx="310" cy="87" r="2.5"/>
      <!-- Row 3 -->
      <circle cx="210" cy="109" r="2.5"/><circle cx="230" cy="109" r="2.5"/><circle cx="250" cy="109" r="2.5"/><circle cx="270" cy="109" r="2.5"/><circle cx="290" cy="109" r="2.5"/><circle cx="310" cy="109" r="2.5"/>
      <!-- Row 4 -->
      <circle cx="210" cy="131" r="2.5"/><circle cx="230" cy="131" r="2.5"/><circle cx="250" cy="131" r="2.5"/><circle cx="270" cy="131" r="2.5"/><circle cx="290" cy="131" r="2.5"/><circle cx="310" cy="131" r="2.5"/>
      <!-- Row 5 -->
      <circle cx="210" cy="153" r="2.5"/><circle cx="230" cy="153" r="2.5"/><circle cx="250" cy="153" r="2.5"/><circle cx="270" cy="153" r="2.5"/><circle cx="290" cy="153" r="2.5"/><circle cx="310" cy="153" r="2.5"/>
    </g>

    <!-- Labels -->
    <g class="mono" fill="rgba(255,255,255,0.4)" font-size="9" letter-spacing="2">
      <text x="95" y="198" text-anchor="middle">SCARCE</text>
      <text x="260" y="198" text-anchor="middle">ABUNDANT</text>
    </g>

    <!-- Text -->
    <g class="mono">
      <text x="24" y="248" fill="rgba(255,255,255,0.5)" font-size="10" letter-spacing="2.5">/ PRINCIPLE 01</text>
    </g>
    <g class="sans" fill="#fafafa" font-size="20" font-weight="500" letter-spacing="-0.3">
      <text x="24" y="290">Industries are artifacts</text>
      <text x="24" y="316">of scarcity.</text>
    </g>
    <g class="sans" fill="rgba(255,255,255,0.6)" font-size="13">
      <text x="24" y="356">Shaped by scarce intelligence,</text>
      <text x="24" y="376">expensive labor, and batch</text>
      <text x="24" y="396">decisions — constraints</text>
      <text x="24" y="416">that are now gone.</text>
    </g>
  </g>

  <!-- ==================== PANEL 02: AI on top vs AI underneath ==================== -->
  <g transform="translate(430, 170)">
    <rect width="340" height="420" rx="20" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>

    <!-- Left stack: AI on top (thin emerald strip) -->
    <g>
      <rect x="30" y="50" width="110" height="10" rx="2" fill="#34d399"/>
      <rect x="30" y="65" width="110" height="26" rx="2" fill="rgba(255,255,255,0.14)"/>
      <rect x="30" y="94" width="110" height="26" rx="2" fill="rgba(255,255,255,0.11)"/>
      <rect x="30" y="123" width="110" height="26" rx="2" fill="rgba(255,255,255,0.08)"/>
      <rect x="30" y="152" width="110" height="26" rx="2" fill="rgba(255,255,255,0.06)"/>
    </g>

    <!-- Right stack: AI underneath (wide emerald foundation) -->
    <g>
      <rect x="205" y="50" width="110" height="26" rx="2" fill="rgba(255,255,255,0.14)"/>
      <rect x="205" y="79" width="110" height="26" rx="2" fill="rgba(255,255,255,0.11)"/>
      <rect x="205" y="108" width="110" height="26" rx="2" fill="rgba(255,255,255,0.08)"/>
      <rect x="205" y="137" width="110" height="26" rx="2" fill="rgba(255,255,255,0.06)"/>
      <!-- Wider foundation -->
      <rect x="188" y="166" width="144" height="14" rx="2" fill="#34d399"/>
    </g>

    <!-- Micro-labels on AI bars -->
    <g class="mono" fill="#0a0a0d" font-size="7" font-weight="700" letter-spacing="1">
      <text x="85" y="58" text-anchor="middle">AI</text>
      <text x="260" y="176" text-anchor="middle">AI</text>
    </g>

    <!-- Labels below stacks -->
    <g class="mono" fill="rgba(255,255,255,0.4)" font-size="9" letter-spacing="2">
      <text x="85" y="202" text-anchor="middle">ON TOP</text>
      <text x="260" y="202" text-anchor="middle">UNDERNEATH</text>
    </g>

    <!-- Text -->
    <g class="mono">
      <text x="24" y="248" fill="rgba(255,255,255,0.5)" font-size="10" letter-spacing="2.5">/ PRINCIPLE 02</text>
    </g>
    <g class="sans" fill="#fafafa" font-size="20" font-weight="500" letter-spacing="-0.3">
      <text x="24" y="290">AI doesn&#8217;t belong on top.</text>
      <text x="24" y="316">It belongs underneath.</text>
    </g>
    <g class="sans" fill="rgba(255,255,255,0.6)" font-size="13">
      <text x="24" y="356">We don&#8217;t layer models onto</text>
      <text x="24" y="376">legacy workflows. We rebuild</text>
      <text x="24" y="396">the system so intelligence</text>
      <text x="24" y="416">runs through it.</text>
    </g>
  </g>

  <!-- ==================== PANEL 03: Incremental vs Replacement ==================== -->
  <g transform="translate(800, 170)">
    <rect width="340" height="420" rx="20" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>

    <!-- Left chart axes -->
    <g stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none">
      <line x1="30" y1="45" x2="30" y2="170"/>
      <line x1="30" y1="170" x2="155" y2="170"/>
    </g>
    <!-- Gentle slope (incremental) -->
    <path d="M 35,155 L 150,115" stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="35" cy="155" r="3.5" fill="rgba(255,255,255,0.55)"/>
    <circle cx="150" cy="115" r="3.5" fill="rgba(255,255,255,0.55)"/>
    <!-- Small delta label -->
    <g class="mono" fill="rgba(255,255,255,0.4)" font-size="8" letter-spacing="1">
      <text x="160" y="118" text-anchor="start">+Δ</text>
    </g>

    <!-- Right chart axes -->
    <g stroke="rgba(52,211,153,0.2)" stroke-width="1" fill="none">
      <line x1="185" y1="45" x2="185" y2="170"/>
      <line x1="185" y1="170" x2="310" y2="170"/>
    </g>
    <!-- Step function (replacement) -->
    <path d="M 190,155 L 238,155 L 238,55 L 310,55" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="190" cy="155" r="3.5" fill="#34d399"/>
    <circle cx="310" cy="55" r="3.5" fill="#34d399"/>
    <!-- Big delta label -->
    <g class="mono" fill="#34d399" font-size="8" letter-spacing="1">
      <text x="315" y="58" text-anchor="start">↑↑</text>
    </g>

    <!-- Labels below charts -->
    <g class="mono" font-size="9" letter-spacing="2">
      <text x="90" y="200" text-anchor="middle" fill="rgba(255,255,255,0.4)">INCREMENTAL</text>
      <text x="248" y="200" text-anchor="middle" fill="#34d399">REPLACEMENT</text>
    </g>

    <!-- Text -->
    <g class="mono">
      <text x="24" y="248" fill="rgba(255,255,255,0.5)" font-size="10" letter-spacing="2.5">/ PRINCIPLE 03</text>
    </g>
    <g class="sans" fill="#fafafa" font-size="20" font-weight="500" letter-spacing="-0.3">
      <text x="24" y="290">The prize isn&#8217;t efficiency.</text>
      <text x="24" y="316">It&#8217;s replacement.</text>
    </g>
    <g class="sans" fill="rgba(255,255,255,0.6)" font-size="13">
      <text x="24" y="356">Marginal improvements protect</text>
      <text x="24" y="376">legacy economics. AI-native</text>
      <text x="24" y="396">systems collapse them — and</text>
      <text x="24" y="416">capture the new ones.</text>
    </g>
  </g>
</svg>
