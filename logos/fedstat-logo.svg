<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" role="img" aria-label="FedStat">
  <defs>
    <clipPath id="ball">
      <circle cx="300" cy="300" r="260"/>
    </clipPath>
    <symbol id="s" viewBox="-1 -1 2 2">
      <path d="M0,-1 0.225,-0.309 0.951,-0.309 0.363,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.363,0.118 -0.951,-0.309 -0.225,-0.309Z"/>
    </symbol>
  </defs>

  <!-- mark: stripes that extend beyond the ball -->
  <g fill="#C8102E">
    <path d="M520,160 Q560,170 590,150 L595,185 Q560,205 520,195 Z"/>
    <path d="M530,440 Q565,455 595,440 L595,475 Q560,490 525,475 Z"/>
  </g>

  <!-- mark: ball interior -->
  <g clip-path="url(#ball)">
    <rect x="0" y="0" width="320" height="600" fill="#1A3668"/>
    <rect x="280" y="0" width="320" height="600" fill="#FFFFFF"/>

    <g fill="#C8102E">
      <path d="M270,135 Q400,90 560,140 L560,175 Q400,130 270,170 Z"/>
      <path d="M260,205 Q400,170 560,210 L560,245 Q400,210 260,240 Z"/>
      <path d="M255,275 Q400,250 565,280 L565,315 Q400,290 255,310 Z"/>
      <path d="M260,345 Q400,330 560,350 L560,385 Q400,370 260,380 Z"/>
      <path d="M270,415 Q400,410 560,420 L560,455 Q400,450 270,450 Z"/>
      <path d="M285,485 Q400,490 555,490 L555,520 Q400,530 285,520 Z"/>
    </g>

    <g fill="#FFFFFF">
      <use href="#s" x="80"  y="100" width="58" height="58"/>
      <use href="#s" x="170" y="80"  width="46" height="46"/>
      <use href="#s" x="60"  y="200" width="50" height="50"/>
      <use href="#s" x="160" y="180" width="70" height="70"/>
      <use href="#s" x="100" y="290" width="44" height="44"/>
      <use href="#s" x="190" y="290" width="54" height="54"/>
      <use href="#s" x="50"  y="370" width="40" height="40"/>
      <use href="#s" x="130" y="380" width="60" height="60"/>
      <use href="#s" x="210" y="395" width="42" height="42"/>
      <use href="#s" x="80"  y="470" width="48" height="48"/>
      <use href="#s" x="170" y="475" width="44" height="44"/>
      <use href="#s" x="120" y="160" width="22" height="22"/>
      <use href="#s" x="220" y="240" width="20" height="20"/>
      <use href="#s" x="40"  y="290" width="18" height="18"/>
      <use href="#s" x="180" y="450" width="20" height="20"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="300" y="720"
        text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="120"
        letter-spacing="6"
        fill="#1A3668">FEDSTAT</text>
</svg>
